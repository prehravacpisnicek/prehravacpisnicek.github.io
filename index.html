<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přehrávač písniček</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #151921; --text: #e0e0e0; }
        
        /* Nastavení písma Calibri a zvětšení základní velikosti */
        body { 
            font-family: 'Calibri', 'Candara', 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-size: 18px; 
        }
        
        .public-card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 25px; 
            width: 450px; 
            border: 1px solid #2d343f; 
            text-align: center; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); 
        }

        h2 { font-size: 32px; margin-bottom: 10px; }
        p { font-size: 18px; color: #888; }

        /* Zvětšená vstupní pole */
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border-radius: 10px; 
            border: 1px solid #2d343f; 
            background: #0b0e14; 
            color: white; 
            box-sizing: border-box;
            font-size: 18px;
        }

        /* Zvětšená tlačítka */
        .btn { 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.3s; 
            margin-top: 15px;
            font-size: 20px; 
        }
        .btn-add { background: var(--primary); color: #0b0e14; }
        .btn-add:hover { background: #00b8e6; transform: scale(1.02); }
        
        .admin-link { 
            margin-top: 35px; 
            color: #555; 
            font-size: 14px; 
            cursor: pointer; 
            text-decoration: underline; 
            border: none; 
            background: none; 
            width: 100%; 
        }

        /* Administrační okno */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.96); z-index: 1000; justify-content: center; align-items: center; 
        }
        .admin-window { 
            background: var(--card); width: 95%; max-width: 1100px; height: 90vh; 
            border-radius: 30px; border: 2px solid var(--primary); padding: 40px; display: flex; flex-direction: column; position: relative;
        }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; cursor: pointer; font-size: 45px; background: none; border: none; }
        
        .content-split { display: flex; gap: 30px; height: 100%; overflow: hidden; margin-top: 20px; }
        .queue-side { flex: 1; overflow-y: auto; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; }
        .player-side { flex: 1.6; background: #000; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; border: 1px solid #222; }

        h3 { font-size: 26px; color: var(--primary); margin-top: 0; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 18px; border-bottom: 1px solid #2d343f; font-size: 20px; }

        .btn-action { 
            width: auto; 
            padding: 12px 20px; 
            margin: 5px; 
            border-radius: 8px; 
            font-size: 16px; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
        }
        .btn-allow { background: #2ecc71; }
        .btn-deny { background: #e74c3c; }

        .status-msg { color: var(--primary); font-size: 16px; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="public-card">
        <h2 style="color:var(--primary);">🎵 Přehrávač písniček</h2>
        <p>Vložte odkaz a nechte ho zahrát</p>
        
        <input type="text" id="newName" placeholder="Název písničky">
        <input type="text" id="newUrl" placeholder="Odkaz (YouTube / MP3)">
        <button class="btn btn-add" onclick="sendToCloud()">PŘIDAT DO FRONTY</button>
        <div id="statusMsg" class="status-msg">Odesláno ke schválení!</div>

        <button class="admin-link" onclick="login()">Správa přehrávání</button>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="admin-window">
            <button class="close-btn" onclick="closeAdmin()">&times;</button>
            <h3>Seznam písniček k povolení</h3>
            
            <div class="content-split">
                <div class="queue-side">
                    <table>
                        <tbody id="queueTable">
                            <tr><td style="color:#666; text-align:center;">Zatím nikdo nic neposlal</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="player-side" id="playerZone">
                    <div style="font-size: 80px; opacity: 0.1;">📻</div>
                    <p style="color:#444; font-size: 22px;">Zde se spustí hudba po schválení</p>
                </div>
            </div>
        </div>
    </div>

<script>
    const ABLY_KEY = 'RtEXCQ.yGvEQQ:CteT-o83GPRK-GQAs6XxwU4eXLp5T-iJ4GcH7Gpt2CI'; 
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('kudelka-music');
    
    const ADMIN_USER = "tomaskudelka9@gmail.com";
    const ADMIN_PASS = "Tomas2901";
    
    let queue = [];

    channel.subscribe('add-song', (msg) => {
        queue.push(msg.data);
        if (document.getElementById('adminModal').style.display === "flex") renderQueue();
    });

    function sendToCloud() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        if (!name || !url) return;

        channel.publish('add-song', { id: Date.now(), name: name, url: url });
        
        document.getElementById('newName').value = "";
        document.getElementById('newUrl').value = "";
        const msg = document.getElementById('statusMsg');
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);
    }

    function login() {
        const user = prompt("Přihlašovací jméno:");
        const pass = prompt("Heslo:");
        
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            document.getElementById('adminModal').style.display = "flex";
            renderQueue();
        } else {
            alert("Nesprávné údaje.");
        }
    }

    function closeAdmin() {
        document.getElementById('adminModal').style.display = "none";
    }

    function renderQueue() {
        const table = document.getElementById('queueTable');
        table.innerHTML = "";
        if (queue.length === 0) {
            table.innerHTML = "<tr><td style='color:#555; text-align:center;'>Žádné nové návrhy</td></tr>";
        }
        queue.forEach(item => {
            table.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td style="text-align:right;">
                        <button class="btn-action btn-allow" onclick="approve(${item.id})">Pustit</button>
                        <button class="btn-action btn-deny" onclick="remove(${item.id})">Smazat</button>
</td>
