<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přehrávač písniček</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #151921; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Veřejná karta */
        .public-card { background: var(--card); padding: 30px; border-radius: 20px; width: 350px; border: 1px solid #2d343f; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d343f; background: #0b0e14; color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-add { background: var(--primary); color: #0b0e14; font-size: 16px; }
        
        .admin-trigger { margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
        .small-input { font-size: 11px; padding: 8px; margin: 4px 0; opacity: 0.5; }

        /* Admin modální okno */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); z-index: 1000; justify-content: center; align-items: center; 
        }
        .admin-window { 
            background: var(--card); width: 95%; max-width: 1000px; height: 85vh; 
            border-radius: 20px; border: 2px solid var(--primary); padding: 30px; display: flex; flex-direction: column; position: relative;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #fff; cursor: pointer; font-size: 30px; background: none; border: none; }
        
        .content-split { display: flex; gap: 25px; height: 100%; overflow: hidden; margin-top: 10px; }
        .queue-side { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; }
        .player-side { flex: 1.5; background: #000; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border: 1px solid #222; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #2d343f; font-size: 14px; }
        .btn-action { width: auto; padding: 8px 12px; margin: 2px; border-radius: 5px; font-size: 12px; }
        .btn-allow { background: #2ecc71; color: white; }
        .btn-deny { background: #e74c3c; color: white; }

        .status-msg { color: var(--primary); font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="public-card">
        <h2 style="color:var(--primary); margin-bottom:5px;">🔊 Audio Hub</h2>
        <p style="color:#666; font-size: 12px; margin-bottom: 20px;">Realtime Cloud Processing Active</p>
        
        <input type="text" id="newName" placeholder="Název písně">
        <input type="text" id="newUrl" placeholder="URL (YouTube / MP3)">
        <button class="btn btn-add" onclick="sendToCloud()">Odeslat</button>
        <div id="statusMsg" class="status-msg">Odesláno</div>

        <div class="admin-trigger">
            <input type="password" id="adminPass" class="small-input" placeholder="Admin heslo">
            <button class="btn" style="background:#222; color:#666; font-size:10px;" onclick="openAdmin()">SPRÁVA SYSTÉMU</button>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="admin-window">
            <button class="close-btn" onclick="closeAdmin()">&times;</button>
            <h2 style="color:var(--primary); margin:0;">🛠️ Řídicí terminál: Ing. Kudělka</h2>
            
            <div class="content-split">
                <div class="queue-side">
                    <h3>📋 Čekající požadavky</h3>
                    <table>
                        <tbody id="queueTable">
                            <tr><td style="color:#444; text-align:center;">Fronta je prázdná</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="player-side" id="playerZone">
                    <div style="font-size: 60px; filter: grayscale(1); opacity: 0.2;">📻</div>
                    <p style="color:#444;">Systém připraven k přehrávání</p>
                </div>
            </div>
        </div>
    </div>

<script>
    // Konfigurace Ably Realtime
    const ABLY_KEY = 'RtEXCQ.yGvEQQ:CteT-o83GPRK-GQAs6XxwU4eXLp5T-iJ4GcH7Gpt2CI'; 
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('kudelka-music');
    const AUTH_PASS = "admin123";
    let queue = [];

    // Odběr zpráv pro admina
    channel.subscribe('add-song', (msg) => {
        queue.push(msg.data);
        if (document.getElementById('adminModal').style.display === "flex") {
            renderQueue();
        }
    });

    // Odesílání z veřejné karty
    function sendToCloud() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        if (!name || !url) return alert("Vyplňte údaje");

        channel.publish('add-song', { id: Date.now(), name: name, url: url });
        
        document.getElementById('newName').value = "";
        document.getElementById('newUrl').value = "";
        const msg = document.getElementById('statusMsg');
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);
    }

    function openAdmin() {
        if (document.getElementById('adminPass').value === AUTH_PASS) {
            document.getElementById('adminModal').style.display = "flex";
            renderQueue();
        } else { alert("Neautorizovaný přístup"); }
    }

    function closeAdmin() {
        document.getElementById('adminModal').style.display = "none";
    }

    function renderQueue() {
        const table = document.getElementById('queueTable');
        table.innerHTML = "";
        if (queue.length === 0) {
            table.innerHTML = "<tr><td style='color:#444; text-align:center;'>Žádné nové návrhy</td></tr>";
        }
        queue.forEach(item => {
            table.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td style="text-align:right;">
                        <button class="btn btn-action btn-allow" onclick="approve(${item.id})">Hrát</button>
                        <button class="btn btn-action btn-deny" onclick="remove(${item.id})">X</button>
                    </td>
                </tr>`;
        });
    }

    function approve(id) {
        const item = queue.find(x => x.id === id);
        if (item) {
            const zone = document.getElementById('playerZone');
            let html = `<div style="width:100%; text-align:center;">
                            <div style="color:var(--primary); margin-bottom:15px; font-weight:bold;">▶️ AKTIVNÍ: ${item.name}</div>`;
            
            if (item.url.includes("youtube.com") || item.url.includes("youtu.be")) {
                let vid = item.url.includes("v=") ? item.url.split("v=")[1].split("&")[0] : item.url.split("/").pop();
                html += `<iframe width="100%" height="400" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:12px; border: 1px solid #333;"></iframe>`;
            } else {
                html += `<audio controls autoplay src="${item.url}" style="width:90%; margin-top:20px;"></audio>`;
            }
            html += `</div>`;
            zone.innerHTML = html;
        }
        remove(id);
    }

    function remove(id) {
        queue = queue.filter(x => x.id !== id);
        renderQueue();
    }
</script>
</body>
</html>
