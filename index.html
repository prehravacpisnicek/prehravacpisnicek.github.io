<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>YouTube Music AI Manager | Ing. Kudělka</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/toxicity"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --primary: #ff0000; --accent: #00d2ff; --bg: #0b0e14; --card: #151921; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .main-card { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 850px; border: 1px solid #2d343f; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .admin-box { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d343f; background: #0b0e14; color: white; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-skip { background: #f39c12; color: white; margin-top: 10px; padding: 10px 25px; }
        
        .flex-container { display: flex; gap: 20px; margin-top: 20px; }
        .column { flex: 1; background: #1c232d; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        
        .song-item { background: #252d38; padding: 10px; margin-bottom: 8px; border-radius: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--primary); }
        .badge { font-size: 10px; padding: 3px 6px; border-radius: 3px; text-transform: uppercase; font-weight: bold; }
        .badge-danger { background: #e74c3c; color: white; }
        .badge-safe { background: #2ecc71; color: white; }

        #player-zone { margin-top: 30px; text-align: center; border-top: 2px solid var(--primary); padding-top: 20px; }
        .platform-note { font-size: 12px; color: #888; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <h2 id="header">🔴 YT MUSIC & YOUTUBE AI GUARD</h2>
    <p class="platform-note">Test</p>

    <div id="loginArea" style="text-align: center;">
        <input type="text" id="user" placeholder="Uživatelské jméno">
        <input type="password" id="pass" placeholder="Heslo">
        <button class="btn btn-add" onclick="login()">AUTORIZOVAT PŘÍSTUP</button>
    </div>

    <div id="adminArea" class="admin-box">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #0b0e14; padding: 10px; border-radius: 8px;">
            <span>AI Detekce: <input type="checkbox" id="aiToggle" checked></span>
            <span id="aiStatus" style="font-size: 12px; color: var(--accent);">Inicializace AI...</span>
        </div>
        
        <input type="text" id="newName" placeholder="Název písně">
        <input type="text" id="newUrl" placeholder="Vložte odkaz z YouTube Music nebo YouTube">
        <button class="btn btn-add" onclick="processInput()">PŘIDAT DO FRONTY</button>

        <div class="flex-container">
            <div class="column">
                <h4>⚠️ Revize (Škodlivé)</h4>
                <div id="reviewList"></div>
            </div>
            <div class="column">
                <h4>📜 Playlist k přehrání</h4>
                <div id="playlistList"></div>
            </div>
        </div>
    </div>

    <div id="player-zone">
        <div id="nowPlayingLabel" style="font-weight: bold; margin-bottom: 10px; color: var(--accent);">Systém připraven</div>
        <div id="mediaContainer"></div>
        <button id="skipBtn" class="btn btn-skip" style="display:none;" onclick="skipSong()">⏭️ PŘESKOČIT SKLADBU</button>
    </div>
</div>

<script>
    let aiModel;
    let ytPlayer;
    const AUTH = { user: "Tomas", pass: "admin123" };
    let reviewQueue = [];
    let playlist = [];
    let isPlaying = false;

    async function initAI() {
        try {
            aiModel = await toxicity.load(0.8);
            document.getElementById('aiStatus').innerText = "AI AKTIVNÍ";
        } catch(e) { document.getElementById('aiStatus').innerText = "AI CHYBA"; }
    }

    function login() {
        if (document.getElementById('user').value === AUTH.user && document.getElementById('pass').value === AUTH.pass) {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('adminArea').style.display = "block";
            document.getElementById('header').innerText = "Administrace: YouTube & YT Music";
        } else { alert("Přístup odepřen!"); }
    }

    async function processInput() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        const aiOn = document.getElementById('aiToggle').checked;

        if (!name || !url) return;

        let toxic = false;
        if (aiOn && aiModel) {
            const pred = await aiModel.classify([name]);
            toxic = pred.some(p => p.results[0].match);
        }

        const song = { id: Date.now(), name, url };

        if (aiOn && !toxic) {
            addToPlaylist(song);
        } else {
            song.toxic = toxic;
            reviewQueue.push(song);
            renderReview();
        }
        document.getElementById('newName').value = ""; 
        document.getElementById('newUrl').value = "";
    }

    function addToPlaylist(song) {
        playlist.push(song);
        renderPlaylist();
        if (!isPlaying) playNext();
    }

    function renderReview() {
        const div = document.getElementById('reviewList');
        div.innerHTML = "";
        reviewQueue.forEach(s => {
            div.innerHTML += `<div class="song-item">
                <span>${s.name} <span class="badge badge-danger">${s.toxic?'AI STOP':'RUČNÍ'}</span></span>
                <button class="btn" style="background:#2ecc71; color:white; padding:5px;" onclick="approve(${s.id})">OK</button>
            </div>`;
        });
    }

    function renderPlaylist() {
        const div = document.getElementById('playlistList');
        div.innerHTML = "";
        playlist.forEach(s => {
            div.innerHTML += `<div class="song-item">${s.name} <span style="color:#666; font-size:10px;">V pořadí</span></div>`;
        });
    }

    function approve(id) {
        const s = reviewQueue.find(x => x.id === id);
        reviewQueue = reviewQueue.filter(x => x.id !== id);
        renderReview();
        addToPlaylist(s);
    }

    function playNext() {
        if (playlist.length === 0) {
            isPlaying = false;
            document.getElementById('nowPlayingLabel').innerText = "Playlist je prázdný.";
            document.getElementById('mediaContainer').innerHTML = "";
            document.getElementById('skipBtn').style.display = "none";
            return;
        }

        isPlaying = true;
        const currentSong = playlist.shift();
        renderPlaylist();
        document.getElementById('nowPlayingLabel').innerText = "▶️ NYNÍ HRAJE: " + currentSong.name;
        document.getElementById('skipBtn').style.display = "inline-block";
        
        const container = document.getElementById('mediaContainer');
        container.innerHTML = `<div id="yt-placeholder"></div>`;

        // Extrakce ID z YouTube nebo YT Music
        let videoId = "";
        if (currentSong.url.includes("v=")) {
            videoId = currentSong.url.split("v=")[1].split("&")[0];
        } else if (currentSong.url.includes("youtu.be/")) {
            videoId = currentSong.url.split("youtu.be/")[1].split("?")[0];
        }

        if (videoId) {
            ytPlayer = new YT.Player('yt-placeholder', {
                height: '350', width: '100%', videoId: videoId,
                playerVars: { 'autoplay': 1, 'origin': window.location.origin },
                events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) playNext(); } }
            });
        } else {
            container.innerHTML = "<p style='color:red;'>Neplatný YouTube odkaz.</p>";
            setTimeout(playNext, 3000);
        }
    }

    function skipSong() {
        if (ytPlayer && ytPlayer.stopVideo) {
            ytPlayer.stopVideo();
            playNext();
        }
    }

    initAI();
</script>
</body>
</html>
