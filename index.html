<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přehravač písniček</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #151921; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .main-card { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 700px; border: 1px solid #2d343f; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .admin-box { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d343f; background: #0b0e14; color: white; box-sizing: border-box; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-allow { background: #2ecc71; color: white; }
        .btn-deny { background: #e74c3c; color: white; }
        .btn-add { background: var(--primary); color: #0b0e14; width: 100%; margin-top: 10px; font-size: 16px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1c232d; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d343f; }
        th { background: #252d38; color: var(--primary); }
        
        #player-zone { margin-top: 30px; border-top: 2px solid var(--primary); padding-top: 20px; text-align: center; }
        .now-playing { color: var(--primary); font-weight: bold; margin-bottom: 10px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="main-card">
    <h2 id="title">🔐 Správa přehrávání</h2>

    <div id="loginArea">
        <input type="text" id="user" placeholder="Uživatelské jméno">
        <input type="password" id="pass" placeholder="Heslo">
        <button class="btn btn-add" onclick="login()">PŘIHLÁSIT SE</button>
    </div>

    <div id="adminArea" class="admin-box">
        <div style="background: #1c232d; padding: 20px; border-radius: 12px; border: 1px solid #333;">
            <h4>Vložit novou skladbu do fronty:</h4>
            <input type="text" id="newName" placeholder="Název skladby">
            <input type="text" id="newUrl" placeholder="URL odkaz (YouTube / MP3)">
            <button class="btn btn-add" onclick="addToQueue()">PŘIDAT KE SCHVÁLENÍ</button>
        </div>

        <h3>📋 Čekající fronta</h3>
        <table>
            <thead>
                <tr>
                    <th>Skladba</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody id="queueTable"></tbody>
        </table>
    </div>

    <div id="player-zone">
        <p style="color: #555;">Přehrávač zastaven. Čekám na pověření.</p>
    </div>
</div>

<script>
    const AUTH = { user: "Tomas", pass: "Tomas2901" };
    let queue = [];

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if (u === AUTH.user && p === AUTH.pass) {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('adminArea').style.display = "block";
            document.getElementById('title').innerText = "🛠️ Terminál: Ing. Kudělka";
        } else { alert("Přístup odepřen."); }
    }

    function addToQueue() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        
        if (!name || !url) return;

        queue.push({ id: Date.now(), name, url });
        renderQueue();
        
        document.getElementById('newName').value = "";
        document.getElementById('newUrl').value = "";
    }

    function renderQueue() {
        const table = document.getElementById('queueTable');
        table.innerHTML = "";
        queue.forEach(item => {
            table.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>
                        <button class="btn btn-allow" onclick="approve(${item.id})">Povolit</button>
                        <button class="btn btn-deny" onclick="remove(${item.id})">Smazat</button>
                    </td>
                </tr>`;
        });
    }

    function approve(id) {
        const item = queue.find(x => x.id === id);
        if (item) {
            const zone = document.getElementById('player-zone');
            let playerHtml = `<div class="now-playing">▶️ PRÁVĚ HRAJE: ${item.name}</div>`;
            
            if (item.url.includes("youtube.com") || item.url.includes("youtu.be")) {
                let vid = item.url.includes("v=") ? item.url.split("v=")[1].split("&")[0] : item.url.split("/").pop();
                playerHtml += `<iframe width="100%" height="350" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
            } else {
                playerHtml += `<audio controls autoplay src="${item.url}" style="width:100%"></audio>`;
            }
            zone.innerHTML = playerHtml;
        }
        remove(id);
    }

    function remove(id) {
        queue = queue.filter(x => x.id !== id);
        renderQueue();
    }
</script>
</body>
</html>
