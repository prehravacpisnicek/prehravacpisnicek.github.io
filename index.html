<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přehrávač písniček</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #151921; --text: #e0e0e0; }
        body { font-family: 'Calibri', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .main-card { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 700px; border: 1px solid #2d343f; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .section { background: #1c232d; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d343f; background: #0b0e14; color: white; box-sizing: border-box; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; }
        .btn-add { background: var(--primary); color: #0b0e14; font-size: 16px; }
        .btn-login { background: #34495e; color: white; margin-top: 10px; }
        .btn-allow { background: #2ecc71; color: white; width: auto; }
        .btn-deny { background: #e74c3c; color: white; width: auto; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d343f; }
        
        #adminPanel { display: none; margin-top: 20px; border-top: 2px dashed var(--primary); padding-top: 20px; }
        #player-zone { margin-top: 20px; text-align: center; }
        .status-msg { color: var(--primary); text-align: center; font-weight: bold; margin: 10px 0; display: none; }
    </style>
</head>
<body>

<div class="main-card">
    <h2>Playlist</h2>
    
    <div class="section">
        <h4>Píseň:</h4>
        <input type="text" id="newName" placeholder="Název skladby">
        <input type="text" id="newUrl" placeholder="URL odkaz (YouTube / MP3)">
        <button class="btn btn-add" onclick="publicAdd()">Odeslat</button>
        <div id="statusMsg" class="status-msg">Píseň byla odeslána do fronty!</div>
    </div>

    <div id="loginArea" class="section">
        <h4>Administrace
        <input type="text" id="user" placeholder="Uživatelské jméno">
        <input type="password" id="pass" placeholder="Heslo">
        <button class="btn btn-login" onclick="login()">PŘIHLÁSIT SE</button>
    </div>

    <div id="adminPanel">
        <h3 style="color:var(--primary)">🛠️ Kontrolní konzole</h3>
        
        <table>
            <thead>
                <tr>
                    <th>Název</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody id="queueTable"></tbody>
        </table>

        <div id="player-zone">
            <p style="color: #555;">Žádná píseň není aktivní.</p>
        </div>
    </div>
</div>

<script>
    const AUTH = { user: "Tomas", pass: "Tomas2901" };
    let queue = [];

    // Veřejná funkce pro přidání bez přihlášení
    function publicAdd() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        
        if (!name || !url) {
            alert("Vyplňte název i odkaz!");
            return;
        }

        queue.push({ id: Date.now(), name, url });
        
        // Vymazání polí a potvrzení
        document.getElementById('newName').value = "";
        document.getElementById('newUrl').value = "";
        const msg = document.getElementById('statusMsg');
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);

        // Pokud je admin přihlášen, hned aktualizuj tabulku
        if (document.getElementById('adminPanel').style.display === "block") {
            renderQueue();
        }
    }

    // Přihlášení
    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if (u === AUTH.user && p === AUTH.pass) {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            renderQueue();
        } else {
            alert("Neautorizovaný přístup!");
        }
    }

    function renderQueue() {
        const table = document.getElementById('queueTable');
        table.innerHTML = "";
        queue.forEach(item => {
            table.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>
                        <button class="btn btn-allow" onclick="approve(${item.id})">Povolit</button>
                        <button class="btn btn-deny" onclick="remove(${item.id})">Smazat</button>
                    </td>
                </tr>`;
        });
    }

    function approve(id) {
        const item = queue.find(x => x.id === id);
        if (item) {
            const zone = document.getElementById('player-zone');
            let html = `<h4 style="color:var(--primary)">▶️ Hraje: ${item.name}</h4>`;
            
            if (item.url.includes("youtube.com") || item.url.includes("youtu.be")) {
                let vid = item.url.includes("v=") ? item.url.split("v=")[1].split("&")[0] : item.url.split("/").pop();
                html += `<iframe width="100%" height="300" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
            } else {
                html += `<audio controls autoplay src="${item.url}" style="width:100%"></audio>`;
            }
            zone.innerHTML = html;
        }
        remove(id);
    }

    function remove(id) {
        queue = queue.filter(x => x.id !== id);
        renderQueue();
    }
</script>
</body>
</html>
