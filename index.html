<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>přehravač písniček</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #151921; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Hlavní karta pro veřejnost */
        .public-card { background: var(--card); padding: 30px; border-radius: 20px; width: 400px; border: 1px solid #2d343f; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d343f; background: #0b0e14; color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-add { background: var(--primary); color: #0b0e14; font-size: 16px; }
        .btn-login-trigger { background: transparent; color: #555; border: 1px solid #333; margin-top: 30px; font-size: 12px; }

        /* MODÁLNÍ OKNO (ADMINISTRACE) */
        .modal-overlay { 
            display: none; /* Skryté v základu */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); z-index: 1000; 
            justify-content: center; align-items: center; 
        }
        .admin-window { 
            background: var(--card); width: 90%; max-width: 800px; max-height: 90vh; 
            border-radius: 20px; border: 1px solid var(--primary); 
            padding: 30px; position: relative; overflow-y: auto; 
        }
        .close-admin { position: absolute; top: 20px; right: 20px; color: #888; cursor: pointer; font-size: 24px; }
        
        /* Tabulka a Přehrávač v okně */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d343f; }
        .btn-action { width: auto; padding: 6px 12px; margin: 2px; }
        .btn-allow { background: #2ecc71; color: white; }
        .btn-deny { background: #e74c3c; color: white; }
        #player-zone { margin-top: 20px; padding: 20px; background: #0b0e14; border-radius: 10px; }

        .status-msg { color: var(--primary); font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="public-card">
        <h2 style="color:var(--primary)">🎵 Navrhnout píseň</h2>
        <p style="color:#777; font-size: 14px;">Vaše skladba se zařadí do fronty ke schválení.</p>
        
        <input type="text" id="newName" placeholder="Název skladby">
        <input type="text" id="newUrl" placeholder="URL odkaz (YouTube / MP3)">
        <button class="btn btn-add" onclick="publicAdd()">ODESLAT</button>
        <div id="statusMsg" class="status-msg">Odesláno do fronty!</div>

        <button class="btn btn-login-trigger" onclick="showLoginPrompt()">VSTUP PRO ADMINISTRÁTORA</button>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="admin-window">
            <span class="close-admin" onclick="closeAdmin()">&times;</span>
            <h2 style="color:var(--primary); margin-top: 0;">🛠️ Administrace: Ing. Kudělka</h2>
            
            <div id="queueSection">
                <h3>📋 Fronta ke schválení</h3>
                <table>
                    <thead>
                        <tr><th>Název</th><th>Akce</th></tr>
                    </thead>
                    <tbody id="queueTable">
                        </tbody>
                </table>
            </div>

            <div id="player-zone">
                <p style="color: #444;">Přehrávač je připraven.</p>
            </div>
        </div>
    </div>

<script>
    const AUTH = { user: "Tomas", pass: "admin123" };
    let queue = [];

    // Funkce pro přidání písně kýmkoliv
    function publicAdd() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        if (!name || !url) return alert("Vyplňte údaje!");

        queue.push({ id: Date.now(), name, url });
        
        document.getElementById('newName').value = "";
        document.getElementById('newUrl').value = "";
        const msg = document.getElementById('statusMsg');
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);
        
        renderQueue();
    }

    // Vyvolání přihlášení a otevření okna
    function showLoginPrompt() {
        const u = prompt("Uživatelské jméno:");
        const p = prompt("Heslo:");
        
        if (u === AUTH.user && p === AUTH.pass) {
            document.getElementById('adminModal').style.display = "flex";
            renderQueue();
        } else {
            alert("Neoprávněný přístup!");
        }
    }

    function closeAdmin() {
        document.getElementById('adminModal').style.display = "none";
    }

    function renderQueue() {
        const table = document.getElementById('queueTable');
        table.innerHTML = "";
        if (queue.length === 0) {
            table.innerHTML = "<tr><td colspan='2' style='text-align:center; color:#555;'>Žádné nové návrhy</td></tr>";
        }
        queue.forEach(item => {
            table.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>
                        <button class="btn btn-action btn-allow" onclick="approve(${item.id})">Povolit</button>
                        <button class="btn btn-action btn-deny" onclick="remove(${item.id})">Smazat</button>
                    </td>
                </tr>`;
        });
    }

    function approve(id) {
        const item = queue.find(x => x.id === id);
        if (item) {
            const zone = document.getElementById('player-zone');
            let html = `<h4 style="color:var(--primary)">▶️ PRÁVĚ HRAJE: ${item.name}</h4>`;
            
            if (item.url.includes("youtube.com") || item.url.includes("youtu.be")) {
                let vid = item.url.includes("v=") ? item.url.split("v=")[1].split("&")[0] : item.url.split("/").pop();
                html += `<iframe width="100%" height="350" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
            } else {
                html += `<audio controls autoplay src="${item.url}" style="width:100%"></audio>`;
            }
            zone.innerHTML = html;
        }
        remove(id);
    }

    function remove(id) {
        queue = queue.filter(x => x.id !== id);
        renderQueue();
    }
</script>
</body>
</html>
