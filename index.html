<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přehrávač Písniček</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/toxicity"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #050505; --card: #111111; --text: #e0e0e0; --panel: #1a1a1a; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
        }

        .main-container { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 800px; 
            border: 1px solid #222; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }

        h2 { color: var(--accent); text-align: center; font-weight: 300; letter-spacing: 2px; }

        /* Veřejná sekce vkládání */
        .public-input-section { 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            border: 1px solid #333;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 6px; 
            border: 1px solid #333; 
            background: #000; 
            color: #fff; 
            box-sizing: border-box; 
        }

        .btn { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }

        .btn-blue { background: var(--accent); color: #000; width: 100%; margin-top: 10px; }
        .btn-blue:hover { opacity: 0.8; }

        .btn-admin-access { 
            background: transparent; 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            margin-top: 20px; 
            font-size: 12px;
        }

        /* Skrytá Admin sekce */
        #adminArea { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }

        .flex-row { display: flex; gap: 15px; margin-top: 15px; }
        .col { flex: 1; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #222; min-height: 150px; }

        .song-item { 
            background: #151515; 
            padding: 10px; 
            margin-bottom: 6px; 
            border-radius: 4px; 
            font-size: 13px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 3px solid var(--accent);
        }

        .badge { font-size: 9px; padding: 2px 5px; border-radius: 3px; background: #333; color: var(--accent); }

        /* Přehrávač */
        #player-zone { margin-top: 30px; text-align: center; }
        #nowPlayingLabel { color: var(--accent); margin-bottom: 15px; font-size: 14px; letter-spacing: 1px; }

        /* Login Modal */
        #loginOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-card { background: var(--panel); padding: 30px; border-radius: 10px; width: 300px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="main-container">
    <h2>AUDIO TERMINAL</h2>
    
    <div class="public-input-section">
        <input type="text" id="newName" placeholder="Název skladby">
        <input type="text" id="newUrl" placeholder="URL (YouTube Music / YouTube)">
        <button class="btn btn-blue" onclick="processInput()">ODESLAT KE KONTROLE</button>
    </div>

    <div style="text-align: right;">
        <button class="btn btn-admin-access" onclick="openLogin()">ADMINISTRACE</button>
    </div>

    <div id="adminArea">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="font-size: 13px;">AI Guard: <input type="checkbox" id="aiToggle" checked></span>
            <button class="btn" style="background:#444; color:white; font-size:11px;" onclick="skipSong()">⏭️ PŘESKOČIT</button>
        </div>

        <div class="flex-row">
            <div class="col">
                <h4 style="margin-top:0; color:#888;">⚠️ K revizi</h4>
                <div id="reviewList"></div>
            </div>
            <div class="col">
                <h4 style="margin-top:0; color:#888;">📜 Playlist</h4>
                <div id="playlistList"></div>
            </div>
        </div>
    </div>

    <div id="player-zone">
        <div id="nowPlayingLabel">SYSTÉM PŘIPRAVEN</div>
        <div id="mediaContainer"></div>
    </div>
</div>

<div id="loginOverlay">
    <div class="login-card">
        <h3 style="text-align:center; color:var(--accent);">PŘIHLÁŠENÍ</h3>
        <input type="text" id="user" placeholder="Jméno">
        <input type="password" id="pass" placeholder="Heslo">
        <button class="btn btn-blue" onclick="attemptLogin()">VSTOUPIT</button>
        <button class="btn" style="background:transparent; color:#555; width:100%;" onclick="closeLogin()">Zavřít</button>
    </div>
</div>

<script>
    let aiModel;
    let ytPlayer;
    const AUTH = { user: "Tomas", pass: "admin123" };
    let reviewQueue = [];
    let playlist = [];
    let isPlaying = false;

    async function initAI() {
        try { aiModel = await toxicity.load(0.8); console.log("AI Ready"); } catch(e) {}
    }

    // Login Funkce
    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    
    function attemptLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if (u === AUTH.user && p === AUTH.pass) {
            document.getElementById('adminArea').style.display = 'block';
            closeLogin();
        } else { alert("Neplatné údaje."); }
    }

    // Hlavní logika
    async function processInput() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        const aiOn = document.getElementById('aiToggle').checked;

        if (!name || !url) return;

        let toxic = false;
        if (aiOn && aiModel) {
            const pred = await aiModel.classify([name]);
            toxic = pred.some(p => p.results[0].match);
        }

        const song = { id: Date.now(), name, url };

        if (aiOn && !toxic) {
            addToPlaylist(song);
        } else {
            song.toxic = toxic;
            reviewQueue.push(song);
            renderReview();
        }
        document.getElementById('newName').value = ""; document.getElementById('newUrl').value = "";
        alert("Skladba byla odeslána do systému.");
    }

    function addToPlaylist(song) {
        playlist.push(song);
        renderPlaylist();
        if (!isPlaying) playNext();
    }

    function renderReview() {
        const div = document.getElementById('reviewList');
        div.innerHTML = "";
        reviewQueue.forEach(s => {
            div.innerHTML += `<div class="song-item">
                <span>${s.name} <span class="badge">${s.toxic?'AI':'MAN'}</span></span>
                <button class="btn" style="background:var(--accent); color:#000; padding:4px 8px; font-size:10px;" onclick="approve(${s.id})">OK</button>
            </div>`;
        });
    }

    function renderPlaylist() {
        const div = document.getElementById('playlistList');
        div.innerHTML = "";
        playlist.forEach(s => {
            div.innerHTML += `<div class="song-item">${s.name}</div>`;
        });
    }

    function approve(id) {
        const s = reviewQueue.find(x => x.id === id);
        reviewQueue = reviewQueue.filter(x => x.id !== id);
        renderReview();
        addToPlaylist(s);
    }

    function playNext() {
        if (playlist.length === 0) {
            isPlaying = false;
            document.getElementById('nowPlayingLabel').innerText = "KONEC PLAYLISTU";
            document.getElementById('mediaContainer').innerHTML = "";
            return;
        }

        isPlaying = true;
        const currentSong = playlist.shift();
        renderPlaylist();
        document.getElementById('nowPlayingLabel').innerText = "▶️ " + currentSong.name.toUpperCase();
        
        const container = document.getElementById('mediaContainer');
        container.innerHTML = `<div id="yt-placeholder"></div>`;

        let videoId = "";
        if (currentSong.url.includes("v=")) {
            videoId = currentSong.url.split("v=")[1].split("&")[0];
        } else if (currentSong.url.includes("youtu.be/")) {
            videoId = currentSong.url.split("youtu.be/")[1].split("?")[0];
        }

        if (videoId) {
            ytPlayer = new YT.Player('yt-placeholder', {
                height: '350', width: '100%', videoId: videoId,
                playerVars: { 'autoplay': 1, 'origin': window.location.origin },
                events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) playNext(); } }
            });
        } else { setTimeout(playNext, 2000); }
    }

    function skipSong() {
        if (ytPlayer && ytPlayer.stopVideo) { ytPlayer.stopVideo(); playNext(); }
    }

    initAI();
</script>
</body>
</html>
