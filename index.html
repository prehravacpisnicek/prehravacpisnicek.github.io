<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přehrávač písniček</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #151921; --text: #e0e0e0; }
        
        body { 
            font-family: 'Calibri', 'Candara', 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; font-size: 22px; 
        }
        
        .container { width: 100%; max-width: 850px; }
        .section-card { 
            background: var(--card); padding: 40px; border-radius: 25px; 
            border: 1px solid #2d343f; margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 40px; margin-top: 0; color: var(--primary); text-align: center; }
        h3 { font-size: 30px; border-bottom: 2px solid #2d343f; padding-bottom: 12px; margin-bottom: 25px; }

        input { 
            width: 100%; padding: 20px; margin: 15px 0; border-radius: 12px; 
            border: 1px solid #2d343f; background: #0b0e14; color: white; 
            box-sizing: border-box; font-size: 22px;
        }

        .btn { 
            padding: 22px; border: none; border-radius: 15px; 
            cursor: pointer; font-weight: bold; width: 100%; 
            transition: 0.3s; font-size: 24px; 
        }
        .btn-add { background: var(--primary); color: #0b0e14; }
        .btn-add:hover { background: #00b8e6; transform: scale(1.01); }

        /* Přepínač pro Autoplay */
        .autoplay-box {
            background: #1c232d; padding: 25px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px; border: 2px solid #34495e;
        }
        .switch { position: relative; display: inline-block; width: 70px; height: 38px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444; transition: .4s; border-radius: 38px;
        }
        .slider:before {
            position: absolute; content: ""; height: 30px; width: 30px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(32px); }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 18px; border-bottom: 1px solid #2d343f; font-size: 22px; }
        
        .btn-action { padding: 14px 28px; margin: 5px; border-radius: 12px; font-size: 18px; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-allow { background: #2ecc71; }
        .btn-deny { background: #e74c3c; }

        #player-display { 
            background: #000; border-radius: 25px; margin-top: 25px; 
            padding: 25px; min-height: 300px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border: 1px solid #333;
        }
        .status-msg { color: var(--primary); font-size: 20px; margin-top: 15px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-card">
        <h2>🎵 Přehrávač písniček</h2>
        <input type="text" id="newName" placeholder="Název písničky">
        <input type="text" id="newUrl" placeholder="Odkaz (YouTube / MP3)">
        <button class="btn btn-add" onclick="sendToCloud()">PŘIDAT DO SEZNAMU</button>
        <div id="statusMsg" class="status-msg">Odesláno do cloudu!</div>
    </div>

    <div class="section-card">
        <h3>📋 Seznam čekajících</h3>
        <table id="publicTable"><tbody id="publicQueueBody">
            <tr><td style="color:#666; text-align:center;">Seznam je prázdný</td></tr>
        </tbody></table>
    </div>

    <div id="adminArea" class="section-card" style="border: 2px solid var(--primary);">
        <h3>🛠️ Správa přehrávání</h3>
        
        <div id="loginFields">
            <input type="text" id="adminUser" placeholder="tomaskudelka9@gmail.com">
            <input type="password" id="adminPass" placeholder="Heslo">
            <button class="btn" style="background:#444; color:white;" onclick="checkLogin()">PŘIHLÁSIT SE</button>
        </div>

        <div id="adminControls" style="display:none;">
            <div class="autoplay-box">
                <span style="font-weight:bold; color:#2ecc71; font-size: 24px;">AUTOMATICKÉ PŘEHRÁVÁNÍ</span>
                <label class="switch">
                    <input type="checkbox" id="autoplayToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <table id="adminTable"><tbody id="adminQueueBody"></tbody></table>
            
            <div id="player-display">
                <p style="color:#444; font-size: 22px;">Zde se spustí hudba</p>
            </div>
        </div>
    </div>
</div>

<script>
    const ABLY_KEY = 'RtEXCQ.yGvEQQ:CteT-o83GPRK-GQAs6XxwU4eXLp5T-iJ4GcH7Gpt2CI'; 
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('kudelka-music');
    
    const ADMIN_USER = "tomaskudelka9@gmail.com";
    const ADMIN_PASS = "Tomas2901";
    
    let queue = [];
    let isPlaying = false;

    channel.subscribe('add-song', (msg) => {
        queue.push(msg.data);
        renderQueues();
        
        if (document.getElementById('autoplayToggle').checked && !isPlaying) {
            approve(queue[0].id);
        }
    });

    function sendToCloud() {
        const name = document.getElementById('newName').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        if (!name || !url) return;
        channel.publish('add-song', { id: Date.now(), name: name, url: url });
        document.getElementById('newName').value = "";
        document.getElementById('newUrl').value = "";
        const msg = document.getElementById('statusMsg');
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);
    }

    function checkLogin() {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPass').value;
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            document.getElementById('loginFields').style.display = "none";
            document.getElementById('adminControls').style.display = "block";
        } else { alert("Špatné údaje"); }
    }

    function renderQueues() {
        const publicBody = document.getElementById('publicQueueBody');
        const adminBody = document.getElementById('adminQueueBody');
        publicBody.innerHTML = ""; adminBody.innerHTML = "";

        if (queue.length === 0) {
            publicBody.innerHTML = "<tr><td style='color:#666; text-align:center;'>Seznam je prázdný</td></tr>";
            return;
        }

        queue.forEach(item => {
            publicBody.innerHTML += `<tr><td><strong>${item.name}</strong></td></tr>`;
            adminBody.innerHTML += `<tr><td><strong>${item.name}</strong></td><td style="text-align:right;">
                <button class="btn-action btn-allow" onclick="approve(${item.id})">Pustit</button>
                <button class="btn-action btn-deny" onclick="remove(${item.id})">Smazat</button>
            </td></tr>`;
        });
    }

    function approve(id) {
        const item = queue.find(x => x.id === id);
        if (!item) return;

        isPlaying = true;
        const display = document.getElementById('player-display');
        let html = `<div style="width:100%; text-align:center;"><div style="color:var(--primary); margin-bottom:15px; font-weight:bold;">Právě hraje: ${item.name}</div>`;
        
        if (item.url.includes("youtube.com") || item.url.includes("youtu.be")) {
            let vid = item.url.includes("v=") ? item.url.split("v=")[1].split("&")[0] : item.url.split("/").pop();
            html += `<iframe id="yt-player" width="100%" height="450" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allow="autoplay" style="border-radius:20px;"></iframe>`;
        } else {
            html += `<audio id="audio-player" controls autoplay src="${item.url}" style="width:95%;" onended="songEnded()"></audio>`;
        }
        display.innerHTML = html + `</div>`;

        remove(id);
    }

    function songEnded() {
        isPlaying = false;
        if (document.getElementById('autoplayToggle').checked && queue.length > 0) {
            approve(queue[0].id);
        }
    }

    function remove(id) {
        queue = queue.filter(x => x.id !== id);
        renderQueues();
    }
</script>
</body>
</html>
